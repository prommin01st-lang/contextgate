services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contextgate_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contextgate_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: test
      PORT: 8899
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/contextgate_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: test-jwt-secret
      API_AUTH_KEY: test-api-key
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "test"]
